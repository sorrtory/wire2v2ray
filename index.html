<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>WireGuard 2 v2ray Generator</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
    <div class="container">
        <h2 style="padding-top: 0; margin-top: 0;">WireGuard 2 v2ray Generator</h2>

        <div class="input" tabindex="-1">
            <div class="output" style="margin-bottom: 10px;">
                <button style="width: 100%;" type="button" onclick="getFromClipboard()">Read from Clipboard</button>
            </div>

            <form id="wg-form">
                <label for="name">Config Name:</label>
                <input type="text" id="name" name="name" value="WireGuard">

                <label for="address">Endpoint Host:</label>
                <input type="text" id="address" name="address" required>

                <label for="port">Endpoint Port:</label>
                <input type="number" id="port" name="port" required>

                <label for="secretKey">Interface Private Key:</label>
                <input type="text" id="secretKey" name="secretKey" required>

                <label for="publicKey">Interface Address (/32 or /128):</label>
                <input type="text" id="publicKey" name="publicKey" required placeholder="10.0.0.2/32">

                <label for="mtu">MTU:</label>
                <input type="number" id="mtu" name="mtu" placeholder="Optional">

                <label for="peerSecretKey">Peer Preshared Key:</label>
                <input type="text" id="peerSecretKey" name="peerSecretKey" placeholder="Optional">

                <label for="peerPublicKey">Peer Public Key:</label>
                <input type="text" id="peerPublicKey" name="peerPublicKey" required>

                <label for="allowedIPs">Allowed IPs:</label>
                <input type="text" id="allowedIPs" name="allowedIPs" required placeholder="0.0.0.0/0, ::/0">

                <button type="button" onclick="convertToURL()">Generate URL</button>
            </form>
        </div>

        <h3>Generated Config:</h3>
        <div class="output">
            <p align="center" id="wg-uri">...</p>
            <button style="width: 100%;" type="button" onclick="copyToClipboard()">Copy to Clipboard</button>
        </div>
    </div>
        <script src="script.js"></script>
    </body>
</html>
